<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity - Company Intelligence API</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            min-height: 100vh;
        }

        .header {
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #6366f1;
        }

        .header-links a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            margin-left: 24px;
            transition: color 0.2s;
        }

        .header-links a:hover {
            color: #fff;
        }

        .hero {
            max-width: 640px;
            margin: 60px auto 40px;
            text-align: center;
            padding: 0 24px;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 15px;
            color: #888;
            line-height: 1.6;
        }

        /* Input section */
        .input-section {
            max-width: 560px;
            margin: 0 auto 48px;
            padding: 0 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #6366f1;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        .btn-analyze {
            padding: 11px 24px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-analyze:hover {
            background: #5558e6;
            transform: translateY(-1px);
        }

        .btn-analyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-analyze.loading {
            position: relative;
            color: transparent;
        }

        .btn-analyze.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-msg {
            text-align: center;
            font-size: 14px;
            color: #888;
            padding: 16px;
        }

        .status-msg.error {
            color: #ef4444;
        }

        /* Results */
        .results {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: none;
        }

        .results.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Company header card */
        .company-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .company-header .name {
            font-size: 22px;
            font-weight: 700;
        }

        .company-header .desc {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
            line-height: 1.5;
        }

        .company-header .meta {
            text-align: right;
            flex-shrink: 0;
            margin-left: 20px;
        }

        .company-header .meta .tag {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(99, 102, 241, 0.12);
            color: #818cf8;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .company-header .meta .stats {
            font-size: 12px;
            color: #666;
        }

        /* Relevance banner */
        .relevance-banner {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .relevance-banner .score {
            font-size: 28px;
            font-weight: 700;
            flex-shrink: 0;
            min-width: 60px;
        }

        .relevance-banner .reasoning {
            font-size: 13px;
            line-height: 1.5;
            color: #ccc;
        }

        .relevance-banner.high {
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .relevance-banner.high .score { color: #22c55e; }

        .relevance-banner.mid {
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .relevance-banner.mid .score { color: #fbbf24; }

        .relevance-banner.low {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .relevance-banner.low .score { color: #ef4444; }

        /* Content grid */
        .intel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .intel-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 18px;
        }

        .intel-card.full-width {
            grid-column: 1 / -1;
        }

        .intel-card h3 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6366f1;
            margin-bottom: 10px;
        }

        .intel-card p {
            font-size: 13px;
            line-height: 1.6;
            color: #bbb;
        }

        .intel-card ul {
            list-style: none;
            padding: 0;
        }

        .intel-card li {
            font-size: 13px;
            line-height: 1.5;
            color: #bbb;
            padding: 5px 0 5px 12px;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .intel-card li:last-child {
            border-bottom: none;
        }

        .intel-card li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 13px;
            width: 4px;
            height: 4px;
            background: #6366f1;
            border-radius: 50%;
        }

        .signal-implication {
            display: block;
            font-size: 12px;
            color: #6366f1;
            margin-top: 2px;
        }

        /* Contradictions */
        .contradiction {
            background: rgba(251, 191, 36, 0.04);
            border: 1px solid rgba(251, 191, 36, 0.12);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .contradiction:last-child {
            margin-bottom: 0;
        }

        .contradiction .label {
            font-size: 10px;
            font-weight: 700;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .contradiction p {
            font-size: 12px;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 3px;
        }

        .tech-tag {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            font-size: 12px;
            color: #aaa;
            margin: 2px 3px 2px 0;
        }

        /* Confidence bar */
        .confidence-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .confidence-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: #6366f1;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .confidence-label {
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .intel-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 26px;
            }
            .input-row {
                flex-direction: column;
            }
            .company-header {
                flex-direction: column;
            }
            .company-header .meta {
                text-align: left;
                margin: 12px 0 0 0;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">clarity<span>.</span></div>
        <div class="header-links">
            <a href="/docs" target="_blank">API Docs</a>
            <a href="https://github.com/deepgori/clarity" target="_blank">GitHub</a>
        </div>
    </header>

    <section class="hero">
        <h1>Company intelligence<br>for AI agents</h1>
        <p>Enter a target company and your company. Clarity researches both, detects contradictions, and returns structured intelligence.</p>
    </section>

    <section class="input-section">
        <div class="input-group">
            <div class="input-row">
                <input type="text" id="domain-input" placeholder="Target company (e.g., datadog.com)">
                <button class="btn-analyze" id="analyze-btn" onclick="runAnalysis()">Analyze</button>
            </div>
            <input type="text" id="seller-input" placeholder="Your company domain (e.g., sentry.io)">
            <input type="text" id="context-input" placeholder="Extra context (optional)">
        </div>
    </section>

    <div id="status" class="status-msg" style="display:none;"></div>

    <section class="results" id="results">
        <div class="company-header" id="company-header"></div>
        <div id="relevance-banner"></div>
        <div class="intel-grid" id="intel-grid"></div>
    </section>

    <script>
        const domainInput = document.getElementById('domain-input');
        const sellerInput = document.getElementById('seller-input');
        const contextInput = document.getElementById('context-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');

        [domainInput, sellerInput, contextInput].forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') runAnalysis();
            });
        });

        async function runAnalysis() {
            const domain = domainInput.value.trim();
            const sellerDomain = sellerInput.value.trim();
            const context = contextInput.value.trim();

            if (!domain) { domainInput.focus(); return; }
            if (!sellerDomain) { sellerInput.focus(); return; }

            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('loading');
            resultsEl.classList.remove('visible');
            statusEl.style.display = 'block';
            statusEl.className = 'status-msg';
            statusEl.textContent = 'Researching both companies in parallel...';

            try {
                const body = { domain, seller_domain: sellerDomain };
                if (context) body.context = context;

                const response = await fetch('/api/company', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await response.json();

                if (!data.success) {
                    statusEl.className = 'status-msg error';
                    statusEl.textContent = data.error || 'Analysis failed';
                    return;
                }

                statusEl.style.display = 'none';
                renderResults(data);
                resultsEl.classList.add('visible');

            } catch (err) {
                statusEl.className = 'status-msg error';
                statusEl.textContent = 'Network error: ' + err.message;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('loading');
            }
        }

        function renderResults(data) {
            const intel = data.intelligence;
            const strat = intel.sales_strategy;

            // Company header
            const header = document.getElementById('company-header');
            header.innerHTML = `
                <div>
                    <div class="name">${intel.company_name}</div>
                    <div class="desc">${intel.what_they_do}</div>
                </div>
                <div class="meta">
                    <div><span class="tag">${intel.industry}</span></div>
                    <div><span class="tag">${intel.stage}</span></div>
                    <div class="stats">${(data.processing_time_ms / 1000).toFixed(1)}s</div>
                </div>
            `;

            // Relevance banner
            const banner = document.getElementById('relevance-banner');
            if (strat.relevance_score !== undefined) {
                const score = strat.relevance_score;
                const pct = (score * 100).toFixed(0);
                let cls = 'high';
                if (score < 0.3) cls = 'low';
                else if (score < 0.6) cls = 'mid';
                banner.className = `relevance-banner ${cls}`;
                banner.innerHTML = `
                    <div class="score">${pct}%</div>
                    <div class="reasoning">${strat.relevance_reasoning}</div>
                `;
                banner.style.display = 'flex';
            } else {
                banner.style.display = 'none';
            }

            // Intelligence grid
            const grid = document.getElementById('intel-grid');
            grid.innerHTML = '';

            // Sales strategy
            grid.innerHTML += `
                <div class="intel-card full-width">
                    <h3>Sales Strategy</h3>
                    <p><strong>Angle:</strong> ${strat.recommended_angle}</p>
                    <p style="margin-top:6px;"><strong>Opener:</strong> ${strat.conversation_starter}</p>
                    <p style="margin-top:6px;"><strong>Timing:</strong> ${strat.timing_assessment}</p>
                    <p style="margin-top:6px;"><strong>Decision Maker:</strong> ${strat.decision_maker_profile}</p>
                    <p style="margin-top:6px;color:#ef4444;"><strong>Avoid:</strong> ${strat.avoid_topics.join(', ')}</p>
                </div>
            `;

            // Signals
            if (intel.signals.length > 0) {
                let signalsHtml = intel.signals.map(s =>
                    `<li>${s.signal}<span class="signal-implication">${s.implication}</span></li>`
                ).join('');
                grid.innerHTML += `
                    <div class="intel-card">
                        <h3>Signals (${intel.signals.length})</h3>
                        <ul>${signalsHtml}</ul>
                    </div>
                `;
            }

            // Contradictions
            if (intel.contradictions.length > 0) {
                let contradictionsHtml = intel.contradictions.map(c => `
                    <div class="contradiction">
                        <div class="label">Contradiction</div>
                        <p><strong>A:</strong> ${c.claim_a}</p>
                        <p><strong>B:</strong> ${c.claim_b}</p>
                        <p style="color:#fbbf24;margin-top:4px;">${c.sales_implication}</p>
                    </div>
                `).join('');
                grid.innerHTML += `
                    <div class="intel-card">
                        <h3>Contradictions (${intel.contradictions.length})</h3>
                        ${contradictionsHtml}
                    </div>
                `;
            } else {
                grid.innerHTML += `
                    <div class="intel-card">
                        <h3>Contradictions</h3>
                        <p style="color:#555;">None detected. Sources are consistent.</p>
                    </div>
                `;
            }

            // Tech stack
            if (intel.tech_stack.length > 0) {
                let techHtml = intel.tech_stack.map(t =>
                    `<span class="tech-tag">${t}</span>`
                ).join('');
                grid.innerHTML += `
                    <div class="intel-card">
                        <h3>Tech Stack</h3>
                        <div>${techHtml}</div>
                    </div>
                `;
            }

            // Hiring signals
            if (intel.hiring_signals.length > 0 && intel.hiring_signals[0] !== '') {
                let hiringHtml = intel.hiring_signals.map(h => `<li>${h}</li>`).join('');
                grid.innerHTML += `
                    <div class="intel-card">
                        <h3>Hiring Signals</h3>
                        <ul>${hiringHtml}</ul>
                    </div>
                `;
            }

            // Confidence
            const conf = intel.overall_confidence;
            grid.innerHTML += `
                <div class="intel-card">
                    <h3>Data Quality</h3>
                    <div class="confidence-row">
                        <div class="confidence-bar"><div class="confidence-fill" style="width:${conf*100}%"></div></div>
                        <span class="confidence-label">${(conf*100).toFixed(0)}% confidence</span>
                    </div>
                    <p style="margin-top:8px;font-size:12px;color:#666;">Sources: ${intel.sources_used.length} pages | Freshness: ${intel.data_freshness}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
