<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity - Company Intelligence for AI Agents</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            min-height: 100vh;
        }

        .header {
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #6366f1;
        }

        .header-links a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            margin-left: 24px;
            transition: color 0.2s;
        }

        .header-links a:hover {
            color: #fff;
        }

        .hero {
            max-width: 680px;
            margin: 80px auto 60px;
            text-align: center;
            padding: 0 24px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 16px;
            color: #888;
            line-height: 1.6;
            max-width: 520px;
            margin: 0 auto;
        }

        .input-section {
            max-width: 560px;
            margin: 0 auto 60px;
            padding: 0 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            border-color: #6366f1;
        }

        .input-row input::placeholder {
            color: #555;
        }

        .btn-analyze {
            padding: 12px 28px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-analyze:hover {
            background: #5558e6;
            transform: translateY(-1px);
        }

        .btn-analyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-analyze.loading {
            position: relative;
            color: transparent;
        }

        .btn-analyze.loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            top: 50%;
            left: 50%;
            margin-left: -9px;
            margin-top: -9px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .selling-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .selling-input:focus {
            border-color: #6366f1;
        }

        .selling-input::placeholder {
            color: #555;
        }

        /* Results */
        .results {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: none;
        }

        .results.visible {
            display: block;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .results-header h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .results-meta {
            font-size: 13px;
            color: #666;
        }

        /* Email comparison */
        .email-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .email-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
        }

        .email-card.generic {
            border-color: rgba(239, 68, 68, 0.2);
        }

        .email-card.clarity {
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(99, 102, 241, 0.04);
        }

        .email-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .email-card-header .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .email-card.generic .badge {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .email-card.clarity .badge {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        .email-card-header h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .email-body {
            font-size: 13px;
            line-height: 1.7;
            color: #bbb;
            white-space: pre-wrap;
        }

        /* Intelligence panel */
        .intel-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 28px;
        }

        .intel-panel h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .intel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .intel-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 16px;
        }

        .intel-section h4 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            margin-bottom: 10px;
        }

        .intel-section p, .intel-section li {
            font-size: 13px;
            line-height: 1.6;
            color: #bbb;
        }

        .intel-section ul {
            list-style: none;
            padding: 0;
        }

        .intel-section li {
            padding: 4px 0;
            padding-left: 14px;
            position: relative;
        }

        .intel-section li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            width: 4px;
            height: 4px;
            background: #6366f1;
            border-radius: 50%;
        }

        /* Contradictions get highlighted */
        .contradiction-item {
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .contradiction-item .label {
            font-size: 11px;
            font-weight: 600;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .contradiction-item p {
            font-size: 13px;
            line-height: 1.5;
            color: #ccc;
        }

        .confidence-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: #6366f1;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .status-msg {
            text-align: center;
            font-size: 14px;
            color: #888;
            padding: 20px;
        }

        .status-msg.error {
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .email-comparison {
                grid-template-columns: 1fr;
            }
            .intel-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 28px;
            }
            .input-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">clarity<span>.</span></div>
        <div class="header-links">
            <a href="/docs" target="_blank">API Docs</a>
            <a href="https://github.com/deepgori/clarity" target="_blank">GitHub</a>
        </div>
    </header>

    <section class="hero">
        <h1>Company intelligence<br>for AI agents</h1>
        <p>One API call. Parallel source fetching. Contradiction detection. Structured output your agents can actually use.</p>
    </section>

    <section class="input-section">
        <div class="input-group">
            <div class="input-row">
                <input type="text" id="domain-input" placeholder="Target company (e.g., datadog.com)">
                <button class="btn-analyze" id="analyze-btn" onclick="runAnalysis()">Analyze</button>
            </div>
            <input type="text" class="selling-input" id="seller-input" placeholder="Your company domain (e.g., sentry.io)">
            <input type="text" class="selling-input" id="context-input" placeholder="Extra context (optional, e.g., 'focus on their enterprise tier')">
        </div>
    </section>

    <div id="status" class="status-msg" style="display:none;"></div>

    <section class="results" id="results">
        <div class="results-header">
            <h2 id="results-title"></h2>
            <span class="results-meta" id="results-meta"></span>
        </div>
        <div id="relevance-banner" style="display:none;margin-bottom:20px;padding:16px;border-radius:8px;"></div>

        <div class="email-comparison">
            <div class="email-card generic">
                <div class="email-card-header">
                    <span class="badge">Without Clarity</span>
                    <h3>Generic Cold Email</h3>
                </div>
                <div class="email-body" id="generic-email"></div>
            </div>
            <div class="email-card clarity">
                <div class="email-card-header">
                    <span class="badge">With Clarity</span>
                    <h3>Personalized Email</h3>
                </div>
                <div class="email-body" id="clarity-email"></div>
            </div>
        </div>

        <div class="intel-panel">
            <h3>Raw Intelligence</h3>
            <div class="intel-grid" id="intel-grid"></div>
        </div>
    </section>

    <script>
        const domainInput = document.getElementById('domain-input');
        const sellerInput = document.getElementById('seller-input');
        const contextInput = document.getElementById('context-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');

        // Allow Enter key to trigger analysis
        [domainInput, sellerInput, contextInput].forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') runAnalysis();
            });
        });

        async function runAnalysis() {
            const domain = domainInput.value.trim();
            const sellerDomain = sellerInput.value.trim();
            const context = contextInput.value.trim();

            if (!domain) {
                domainInput.focus();
                return;
            }
            if (!sellerDomain) {
                sellerInput.focus();
                return;
            }

            // UI state: loading
            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('loading');
            resultsEl.classList.remove('visible');
            statusEl.style.display = 'block';
            statusEl.className = 'status-msg';
            statusEl.textContent = 'Researching both companies in parallel...';

            try {
                const body = { domain, seller_domain: sellerDomain };
                if (context) body.context = context;

                const response = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await response.json();

                if (!data.success) {
                    statusEl.className = 'status-msg error';
                    statusEl.textContent = data.error || 'Analysis failed';
                    return;
                }

                // Hide status, show results
                statusEl.style.display = 'none';
                renderResults(data);
                resultsEl.classList.add('visible');

            } catch (err) {
                statusEl.className = 'status-msg error';
                statusEl.textContent = 'Network error: ' + err.message;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('loading');
            }
        }

        function renderResults(data) {
            const intel = data.intelligence;

            // Header
            document.getElementById('results-title').textContent = data.company_name;
            document.getElementById('results-meta').textContent =
                `${(data.processing_time_ms / 1000).toFixed(1)}s | Confidence: ${(intel.overall_confidence * 100).toFixed(0)}%`;

            // Emails
            document.getElementById('generic-email').textContent = data.generic_email;
            document.getElementById('clarity-email').textContent = data.clarity_email;

            // Relevance banner
            const banner = document.getElementById('relevance-banner');
            const strat = intel.sales_strategy;
            if (strat.relevance_score !== undefined) {
                banner.style.display = 'block';
                const score = strat.relevance_score;
                if (score < 0.3) {
                    banner.style.background = 'rgba(239, 68, 68, 0.1)';
                    banner.style.border = '1px solid rgba(239, 68, 68, 0.3)';
                    banner.innerHTML = `<span style="color:#ef4444;font-weight:600;">Low Relevance (${(score*100).toFixed(0)}%)</span><br><span style="font-size:13px;color:#ccc;">${strat.relevance_reasoning}</span>`;
                } else if (score < 0.6) {
                    banner.style.background = 'rgba(251, 191, 36, 0.08)';
                    banner.style.border = '1px solid rgba(251, 191, 36, 0.25)';
                    banner.innerHTML = `<span style="color:#fbbf24;font-weight:600;">Weak Fit (${(score*100).toFixed(0)}%)</span><br><span style="font-size:13px;color:#ccc;">${strat.relevance_reasoning}</span>`;
                } else {
                    banner.style.background = 'rgba(34, 197, 94, 0.08)';
                    banner.style.border = '1px solid rgba(34, 197, 94, 0.25)';
                    banner.innerHTML = `<span style="color:#22c55e;font-weight:600;">Good Fit (${(score*100).toFixed(0)}%)</span><br><span style="font-size:13px;color:#ccc;">${strat.relevance_reasoning}</span>`;
                }
            } else {
                banner.style.display = 'none';
            }

            // Intelligence grid
            const grid = document.getElementById('intel-grid');
            grid.innerHTML = '';

            // Company overview
            grid.innerHTML += `
                <div class="intel-section">
                    <h4>Company</h4>
                    <p><strong>${intel.company_name}</strong></p>
                    <p>${intel.what_they_do}</p>
                    <p style="margin-top:6px;color:#888;">${intel.industry} | ${intel.stage}</p>
                </div>
            `;

            // Signals
            let signalsHtml = intel.signals.map(s =>
                `<li>${s.signal}<br><span style="color:#6366f1;font-size:12px;">${s.implication}</span></li>`
            ).join('');
            grid.innerHTML += `
                <div class="intel-section">
                    <h4>Signals (${intel.signals.length})</h4>
                    <ul>${signalsHtml}</ul>
                </div>
            `;


            // Sales strategy
            grid.innerHTML += `
                <div class="intel-section">
                    <h4>Sales Strategy</h4>
                    <p><strong>Angle:</strong> ${strat.recommended_angle}</p>
                    <p style="margin-top:8px;"><strong>Opener:</strong> ${strat.conversation_starter}</p>
                    <p style="margin-top:8px;"><strong>Avoid:</strong> ${strat.avoid_topics.join(', ')}</p>
                    <p style="margin-top:8px;"><strong>Timing:</strong> ${strat.timing_assessment}</p>
                </div>
            `;

            // Contradictions
            if (intel.contradictions.length > 0) {
                let contradictionsHtml = intel.contradictions.map(c => `
                    <div class="contradiction-item">
                        <div class="label">Contradiction Detected</div>
                        <p><strong>Source A:</strong> ${c.claim_a}</p>
                        <p><strong>Source B:</strong> ${c.claim_b}</p>
                        <p style="margin-top:6px;"><strong>Resolution:</strong> ${c.resolution}</p>
                        <p style="color:#fbbf24;"><strong>Sales impact:</strong> ${c.sales_implication}</p>
                    </div>
                `).join('');
                grid.innerHTML += `
                    <div class="intel-section">
                        <h4>Contradictions (${intel.contradictions.length})</h4>
                        ${contradictionsHtml}
                    </div>
                `;
            } else {
                grid.innerHTML += `
                    <div class="intel-section">
                        <h4>Contradictions</h4>
                        <p style="color:#666;">None detected. Sources are consistent.</p>
                    </div>
                `;
            }

            // Tech stack
            if (intel.tech_stack.length > 0) {
                let techHtml = intel.tech_stack.map(t => `<li>${t}</li>`).join('');
                grid.innerHTML += `
                    <div class="intel-section">
                        <h4>Tech Stack</h4>
                        <ul>${techHtml}</ul>
                    </div>
                `;
            }

            // Hiring signals
            if (intel.hiring_signals.length > 0 && intel.hiring_signals[0] !== '') {
                let hiringHtml = intel.hiring_signals.map(h => `<li>${h}</li>`).join('');
                grid.innerHTML += `
                    <div class="intel-section">
                        <h4>Hiring Signals</h4>
                        <ul>${hiringHtml}</ul>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
